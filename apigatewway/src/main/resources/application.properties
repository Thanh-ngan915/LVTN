spring.application.name=apigateway
server.port=8080

# Route to UserService
spring.cloud.gateway.server.webmvc.routes[0].id=userservice-auth
spring.cloud.gateway.server.webmvc.routes[0].uri=http://localhost:8085
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/auth/**

# Route to LivestreamService
spring.cloud.gateway.server.webmvc.routes[1].id=livestreamservice
spring.cloud.gateway.server.webmvc.routes[1].uri=http://localhost:8086
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/livestream/**

# Route to ProductService - Products
spring.cloud.gateway.server.webmvc.routes[2].id=productservice-products
spring.cloud.gateway.server.webmvc.routes[2].uri=http://localhost:8087
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/products/**

# Route to ProductService - Categories
spring.cloud.gateway.server.webmvc.routes[3].id=productservice-categories
spring.cloud.gateway.server.webmvc.routes[3].uri=http://localhost:8087
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/categories/**