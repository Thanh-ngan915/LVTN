<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration | Anvi System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
    
    <div class="container">
        <div class="form-wrapper glassmorphism">
            <div class="header">
                <h1>Tạo tài khoản</h1>
                <p>Tham gia vào hệ thống hệ vi dịch vụ Anvi System.</p>
            </div>
            
            <div id="alert-box" class="alert hidden"></div>

            <form id="registerForm">
                <div class="input-group">
                    <label for="username">Tên đăng nhập</label>
                    <input type="text" id="username" placeholder="Nhập username (từ 3 ký tự)" name="username" required minlength="3">
                </div>
                
                <div class="input-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" placeholder="Mật khẩu bảo mật (từ 6 ký tự)" name="password" required minlength="6">
                </div>
                
                <div class="input-group">
                    <label for="fullName">Họ và tên</label>
                    <input type="text" id="fullName" placeholder="VD: Nguyễn Văn A" name="fullName" required>
                </div>
                
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Địa chỉ email liên hệ" name="email" required>
                </div>

                <div class="input-group">
                    <label for="address">Địa chỉ (Tuỳ chọn)</label>
                    <input type="text" id="address" placeholder="Nhập nơi bạn đang sống" name="address">
                </div>

                <button type="submit" id="submitBtn" class="btn-primary">
                    <span class="btn-text">ĐĂNG KÝ NGAY</span>
                    <span class="loader hidden"></span>
                </button>
            </form>
            <div class="footer-form">
                <p>Đã chạy thành công Gateway? <a href="#" id="checkServer">Kiểm tra kết nối</a></p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
