<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration | Anvi System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
    
    <div class="container">
        <div class="form-wrapper glassmorphism">
            <div class="header">
                <h1>Tạo tài khoản</h1>
                <p>Tham gia vào hệ thống hệ vi dịch vụ Anvi System.</p>
            </div>
            
            <div id="alert-box" class="alert hidden"></div>

            <form id="registerForm">
                <div class="input-group">
                    <label for="username">Tên đăng nhập</label>
                    <input type="text" id="username" placeholder="Nhập username (từ 3 ký tự)" name="username" required minlength="3">
                </div>
                
                <div class="input-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" placeholder="Mật khẩu bảo mật (từ 6 ký tự)" name="password" required minlength="6">
                </div>
                
                <div class="input-group">
                    <label for="fullName">Họ và tên</label>
                    <input type="text" id="fullName" placeholder="VD: Nguyễn Văn A" name="fullName" required>
                </div>
                
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Địa chỉ email liên hệ" name="email" required>
                </div>

                <div class="input-group">
                    <label for="address">Địa chỉ (Tuỳ chọn)</label>
                    <input type="text" id="address" placeholder="Nhập nơi bạn đang sống" name="address">
                </div>

                <button type="submit" id="submitBtn" class="btn-primary">
                    <span class="btn-text">ĐĂNG KÝ NGAY</span>
                    <span class="loader hidden"></span>
                </button>
            </form>
            <div class="divider">
                <span>HOẶC</span>
            </div>

            <button type="button" id="googleLoginBtn" class="btn-google">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
                    <path d="M9.003 18c2.43 0 4.467-.806 5.956-2.18L12.05 13.56c-.806.54-1.836.86-3.047.86-2.344 0-4.328-1.584-5.036-3.711H.96v2.332C2.44 15.983 5.485 18 9.003 18z" fill="#34A853"/>
                    <path d="M3.964 10.712c-.18-.54-.282-1.117-.282-1.71 0-.593.102-1.17.282-1.71V4.96H.957C.347 6.175 0 7.55 0 9.002c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
                    <path d="M9.003 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.464.891 11.426 0 9.003 0 5.485 0 2.44 2.017.96 4.958L3.967 7.29c.708-2.127 2.692-3.71 5.036-3.71z" fill="#EA4335"/>
                </svg>
                <span>Đăng nhập với Google</span>
            </button>

            <div class="footer-form">
                <p>Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a></p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
